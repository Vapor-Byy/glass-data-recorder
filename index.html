<!DOCTYPE html>

<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>My Workbench</title>
  <style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: linear-gradient(135deg, #e0f2fe, #f0fdf4);
}

/* 整体布局 */
.app {
    display: flex;
    height: 100vh;
}

/* 侧边栏 */
.sidebar {
    width: 220px;
    padding: 20px;
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.6);
    box-shadow: 5px 0 20px rgba(0,0,0,0.05);
}

.menu-item {
    padding: 10px;
    border-radius: 10px;
    margin-top: 10px;
    cursor: pointer;
}

.menu-item:hover {
    background: rgba(255,255,255,0.6);
}

.menu-item.active {
    background: rgba(59,130,246,0.3);
}

/* 主区域 */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* 顶部输入 */
.topbar {
    padding: 20px;
}

input {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
}

/* 内容区 */
.content {
    display: flex;
    gap: 20px;
    padding: 20px;
    overflow: auto;
}

/* 列 */
.column {
    flex: 1;
}

/* 卡片 */
#taskList div,
#linkList div,
#noteList div {
    margin-top: 10px;
    padding: 12px;
    border-radius: 14px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
}
</style>
</head>
<div class="app">
    <!-- 侧边栏 -->
    <div class="sidebar">
        <h2>Workbench</h2>
        <div class="menu">
            <div class="menu-item active">全部</div>
            <div class="menu-item">任务</div>
            <div class="menu-item">链接</div>
            <div class="menu-item">记录</div>
        </div>
    </div>

    <!-- 主区域 -->
    <div class="main">
        <div class="topbar">
            <input id="inputBox" placeholder="输入任务 / 想法 / 链接，回车保存">
        </div>
 <div id="browserBox" style="display:none; margin:0 20px 20px 20px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span>内嵌浏览</span>
            <button onclick="closeBrowser()">关闭</button>
        </div>
        <iframe id="browserFrame" style="width:100%; height:300px; border:none; border-radius:12px;"></iframe>
    </div>
        <div class="content">
            <div class="column">
                <h3>任务</h3>
                <div id="taskList"></div>
            </div>
            <div class="column">
                <h3>链接</h3>
                <div id="linkList"></div>
            </div>
            <div class="column">
                <h3>记录</h3>
                <div id="noteList"></div>
            </div>
        </div>
    </div>
</div>

```
<script>
const input = document.getElementById('inputBox');

let data = JSON.parse(localStorage.getItem('workbench') || '[]');

let dragIndex = null;

function openInApp(url) {
    const box = document.getElementById('browserBox');
    const frame = document.getElementById('browserFrame');

    box.style.display = 'block';
    frame.src = url;
}

function closeBrowser() {
    document.getElementById('browserBox').style.display = 'none';
    document.getElementById('browserFrame').src = '';
}function getType(text) {
    if (text.startsWith('http')) return 'link';
    if (text.includes('明天') || text.includes('待办') || text.includes('todo')) return 'task';
    return 'note';
}

function render() {
    const taskList = document.getElementById('taskList');
    const linkList = document.getElementById('linkList');
    const noteList = document.getElementById('noteList');

    taskList.innerHTML = '';
    linkList.innerHTML = '';
    noteList.innerHTML = '';

    data.forEach((item, index) => {
        const div = document.createElement('div');
        div.draggable = true;
        div.dataset.index = index;

        div.style.marginTop = '10px';
        div.style.padding = '10px';
        div.style.borderRadius = '8px';
        div.style.display = 'flex';
        div.style.alignItems = 'center';
        div.style.justifyContent = 'space-between';
        div.style.cursor = 'move';

        const content = document.createElement('div');

        if (item.type === 'link') {
           content.innerHTML = `
<div>
    <span style="cursor:pointer; color:#2563eb;"
    onclick="openInApp('${item.text}')">
        ${item.text}
    </span>
    <button onclick="window.open('${item.text}')"
    style="margin-left:10px;">↗</button>
</div>
`;
        } else if (item.type === 'task') {
            content.innerText = item.text + '（' + item.time + '）';
            div.style.background = '#059669';
        } else {
            content.innerText = item.text + '（' + item.time + '）';
            div.style.background = '#1e293b';
        }

        if (item.done) {
            content.style.textDecoration = 'line-through';
            content.style.opacity = '0.6';
        }

        div.appendChild(content);

        const actions = document.createElement('div');

        if (item.type === 'task') {
            const btn = document.createElement('button');
            btn.innerText = item.done ? '✔' : '○';
            btn.style.marginRight = '10px';

            btn.onclick = () => {
                item.done = !item.done;
                localStorage.setItem('workbench', JSON.stringify(data));
                render();
            };

            actions.appendChild(btn);
        }

        const delBtn = document.createElement('button');
        delBtn.innerText = '删除';
        delBtn.style.background = '#ef4444';
        delBtn.style.color = '#fff';
        delBtn.style.border = 'none';
        delBtn.style.borderRadius = '5px';
        delBtn.style.padding = '5px 8px';

        delBtn.onclick = () => {
            data.splice(index, 1);
            localStorage.setItem('workbench', JSON.stringify(data));
            render();
        };

        actions.appendChild(delBtn);

        div.appendChild(actions);

        // 拖拽
        div.addEventListener('dragstart', () => {
            dragIndex = index;
        });

        div.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        div.addEventListener('drop', () => {
            const targetIndex = index;
            const draggedItem = data[dragIndex];

            data.splice(dragIndex, 1);
            data.splice(targetIndex, 0, draggedItem);

            localStorage.setItem('workbench', JSON.stringify(data));
            render();
        });

        // 分类插入
        if (item.type === 'task') taskList.appendChild(div);
        if (item.type === 'link') linkList.appendChild(div);
        if (item.type === 'note') noteList.appendChild(div);
    });
}

render();

input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const value = input.value.trim();
        if (!value) return;

        data.push({
            text: value,
            time: new Date().toLocaleString(),
            type: getType(value),
            done: false
        });

        localStorage.setItem('workbench', JSON.stringify(data));

        input.value = '';

        render();
    }
});
</script>
