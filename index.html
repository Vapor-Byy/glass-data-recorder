<!DOCTYPE html>

<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>My Workbench</title>
    <link rel="stylesheet" href="styles.css">
</head>
<div class="app">
    <!-- 侧边栏 -->
    <div class="sidebar">
        <h2>Workbench</h2>
        <div class="menu">
            <div class="menu-item active">全部</div>
            <div class="menu-item">任务</div>
            <div class="menu-item">链接</div>
        </div>
    </div>

    <!-- 主区域 -->
    <div class="main">
        <div class="topbar">
            <input id="inputBox" placeholder="输入任务 / 想法 / 链接，回车保存">
        </div>
        <div class="content">
            <div class="column">
                <h3>任务与记录</h3>
                <div id="taskList"></div>
            </div>
            <div class="column">
                <h3>链接</h3>
                <div id="linkList"></div>
            </div>
        </div>
    </div>
</div>

```
<script>
const input = document.getElementById('inputBox');

let data = JSON.parse(localStorage.getItem('workbench') || '[]');

let dragIndex = null;
let currentFilter = '全部'; // 当前过滤器

// 菜单点击事件
document.addEventListener('DOMContentLoaded', function() {
    const menuItems = document.querySelectorAll('.menu-item');
    menuItems.forEach(item => {
        item.addEventListener('click', function() {
            // 移除所有active类
            menuItems.forEach(i => i.classList.remove('active'));
            // 添加active类到当前点击的项
            this.classList.add('active');
            // 设置过滤器
            currentFilter = this.textContent;
            // 重新渲染
            render();
        });
    });

    // 侧边栏宽度拖拽
    const sidebar = document.querySelector('.sidebar');
    let isResizing = false;
    let startX = 0;
    let startWidth = 0;

    sidebar.addEventListener('mousedown', function(e) {
        if (e.offsetX > sidebar.offsetWidth - 10) {
            isResizing = true;
            startX = e.clientX;
            startWidth = sidebar.offsetWidth;
            document.body.style.cursor = 'ew-resize';
            document.body.style.userSelect = 'none';
        }
    });

    document.addEventListener('mousemove', function(e) {
        if (isResizing) {
            const newWidth = startWidth + (e.clientX - startX);
            if (newWidth >= 120 && newWidth <= 180) {
                sidebar.style.width = newWidth + 'px';
            }
        }
    });

    document.addEventListener('mouseup', function() {
        if (isResizing) {
            isResizing = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        }
    });
});

function openLink(url) {
    // 如果URL不以http开头，添加https://
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
    }
    window.open(url, '_blank');
}

function getType(text) {
    // 检查是否为URL（带协议或不带协议的域名）
    const urlPattern = /^(https?:\/\/)?([\da-z\.-]+)\.([a-z\.]{2,6})([\/\w \.-]*)*\/?$/i;
    if (urlPattern.test(text)) return 'link';
    
    if (text.includes('明天') || text.includes('待办') || text.includes('todo')) return 'task';
    return 'note';
}

function render() {
    const taskList = document.getElementById('taskList');
    const linkList = document.getElementById('linkList');

    taskList.innerHTML = '';
    linkList.innerHTML = '';

    data.forEach((item, index) => {
        // 根据当前过滤器决定是否显示
        if (currentFilter !== '全部') {
            const filterMap = {'任务': 'task', '链接': 'link'};
            if (currentFilter === '任务' && item.type !== 'task' && item.type !== 'note') return;
            if (currentFilter === '链接' && item.type !== 'link') return;
        }

        const div = document.createElement('div');
        div.draggable = true;
        div.dataset.index = index;

        const content = document.createElement('div');
        content.style.flex = '1';

        if (item.type === 'link') {
           const linkUrl = item.text.startsWith('http') ? item.text : 'https://' + item.text;
           content.innerHTML = `
<span style="cursor:pointer;" onclick="openLink('${item.text}')">
    ${item.text}
</span>
`;
           linkList.appendChild(div);
        } else {
            // 任务和记录统一显示
            content.innerHTML = `
<span>${item.text}${item.done ? '' : ''}（${item.time}）</span>
`;
            if (item.done) {
                content.style.textDecoration = 'line-through';
                content.style.opacity = '0.6';
            }
            taskList.appendChild(div);
        }

        div.appendChild(content);

        const actions = document.createElement('div');
        actions.style.display = 'flex';
        actions.style.gap = '8px';

        // 给所有类型都添加完成勾选按钮
        const btn = document.createElement('button');
        btn.innerText = item.done ? '✔' : '○';
        btn.style.minWidth = '30px';
        btn.style.padding = '6px 8px';
        
        btn.onclick = (e) => {
            e.stopPropagation();
            item.done = !item.done;
            localStorage.setItem('workbench', JSON.stringify(data));
            render();
        };

        actions.appendChild(btn);

        const delBtn = document.createElement('button');
        delBtn.innerText = '删除';
        delBtn.style.minWidth = '40px';
        delBtn.style.padding = '6px 8px';

        delBtn.onclick = (e) => {
            e.stopPropagation();
            data.splice(index, 1);
            localStorage.setItem('workbench', JSON.stringify(data));
            render();
        };

        actions.appendChild(delBtn);
        div.appendChild(actions);

        // 拖拽
        div.addEventListener('dragstart', () => {
            dragIndex = index;
        });

        div.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        div.addEventListener('drop', () => {
            const targetIndex = index;
            const draggedItem = data[dragIndex];

            data.splice(dragIndex, 1);
            data.splice(targetIndex, 0, draggedItem);

            localStorage.setItem('workbench', JSON.stringify(data));
            render();
        });
    });
}

render();

input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        const value = input.value.trim();
        if (!value) return;

        data.push({
            text: value,
            time: new Date().toLocaleString(),
            type: getType(value),
            done: false
        });

        localStorage.setItem('workbench', JSON.stringify(data));

        input.value = '';

        render();
    }
});
</script>
