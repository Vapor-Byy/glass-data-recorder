<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本地工具集 · 首页</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>

  <main class="app app--home">
    <header class="glass panel header header--home">
      <h1 class="title">本地工具集</h1>
      <p class="subtitle">纯前端页面，数据仅存于本机浏览器</p>
    </header>

    <section class="glass panel home-intro" aria-labelledby="tools-heading">
      <h2 id="tools-heading" class="section-title">可用工具</h2>
      <ul class="tool-list">
        <li class="tool-card">
          <a href="tool.html" class="tool-card-link">
            <span class="tool-card-title">本地记录</span>
            <span class="tool-card-desc">输入内容、保存并在列表中查看，刷新后数据仍在</span>
            <span class="tool-card-cta">进入 →</span>
          </a>
        </li>
      </ul>
    </section>
  </main>

  <footer class="footer">
    <small>本站为静态页面，可部署至任意静态托管。</small>
  </footer>
</body>
</html>
