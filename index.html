<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本地记录 · 玻璃风格</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-gradient" aria-hidden="true"></div>

  <main class="app">
    <header class="glass panel header">
      <h1 class="title">本地记录</h1>
      <p class="subtitle">输入内容后保存，数据仅保存在本机浏览器中</p>
    </header>

    <section class="glass panel input-section" aria-labelledby="input-heading">
      <h2 id="input-heading" class="section-title">新建记录</h2>
      <form id="record-form" class="record-form" novalidate>
        <label for="record-input" class="visually-hidden">记录内容</label>
        <textarea
          id="record-input"
          name="content"
          class="record-input"
          rows="3"
          placeholder="在此输入要保存的内容…"
          maxlength="2000"
          required
        ></textarea>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">保存</button>
          <button type="button" id="clear-input" class="btn btn-ghost">清空输入</button>
        </div>
      </form>
    </section>

    <section class="glass panel list-section" aria-labelledby="list-heading">
      <div class="list-header">
        <h2 id="list-heading" class="section-title">全部记录</h2>
        <span id="record-count" class="badge" aria-live="polite">0 条</span>
      </div>
      <ul id="record-list" class="record-list"></ul>
      <p id="empty-hint" class="empty-hint">暂无记录，保存一条试试吧。</p>
    </section>
  </main>

  <footer class="footer">
    <small>数据存储于浏览器 localStorage，清除站点数据会丢失记录。</small>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
