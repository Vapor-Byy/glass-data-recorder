<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vapor 导航</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-top">
                <h2 id="appTitle">Vapor导航</h2>
                <button type="button" id="themeToggle" class="theme-toggle-btn" aria-label="切换主题">🌙</button>
            </div>
            <nav class="menu">
                <div class="menu-item active" data-view="all">首页</div>
                <div class="menu-item" data-view="tasks">任务</div>
                <div class="menu-item" data-view="links">链接</div>
            </nav>
        </div>

        <!-- 主区域 -->
        <div class="main">
            <div class="topbar">
                <div class="topbar-left">
                    <input id="inputBox" placeholder="输入任务 / 想法 / 链接，回车保存">
                </div>
                <div class="topbar-right">
                    <div class="info-bar">
                        <div class="info-item info-item--time">
                            <span class="info-label">当前时间</span>
                            <span id="clockTime">--:--:--</span>
                        </div>
                        <div class="info-item info-item--date">
                            <span class="info-label">今日日期</span>
                            <div class="date-row">
                                <span id="clockDate">----年--月--日</span>
                                <span class="weekday-suffix" id="weekdayLabel">-</span>
                            </div>
                        </div>
                        <div class="info-item info-item--weather">
                            <span class="info-label">天气</span>
                            <span id="weatherText">☁️ 多云 18°C</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="dashboard-panel" id="dashboardPanel">
                <div class="dashboard-card">
                    <h4>今日任务摘要</h4>
                    <p id="summaryTaskCount">加载中</p>
                </div>
                <div class="dashboard-card">
                    <h4>最近记录</h4>
                    <div id="recentRecords">加载中</div>
                </div>
                <div class="dashboard-card">
                    <h4>常用网站快捷入口</h4>
                    <div id="dashboardLinks">暂无快捷入口</div>
                </div>
                <div class="dashboard-card">
                    <h4>快捷操作</h4>
                    <button type="button" id="quickAdd" class="action-btn">聚焦输入</button>
                </div>
            </div>
            <div class="memo-panel" id="memoPanel">
                <div class="memo-sidebar">
                    <div class="memo-sidebar-header">
                        <h4>项目分类</h4>
                        <button type="button" id="addProjectBtn" class="action-btn">新建项目</button>
                    </div>
                    <div id="projectList" class="project-list"></div>
                </div>
                <div class="memo-details">
                    <div class="memo-details-header">
                        <div>
                            <p class="info-label">当前项目</p>
                            <h3 id="selectedProjectName">请选择项目</h3>
                        </div>
                        <button type="button" id="addMemoBtn" class="action-btn">新增备忘录</button>
                    </div>
                    <div id="memoList" class="memo-list"></div>
                </div>
            </div>
            <div class="content" id="contentPanel">
                <div class="column" id="tasksColumn">
                    <h3>任务与记录</h3>
                    <div id="taskList"></div>
                </div>
                <div class="column" id="linksColumn">
                    <h3>链接</h3>
                    <div id="linkList"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="settings-modal hidden" id="settingsModal">
        <div class="settings-panel">
            <div class="settings-header">
                <div>
                    <h3>设置</h3>
                    <p>个性化工作台配置</p>
                </div>
                <button class="close-settings" id="closeSettings" aria-label="关闭设置">×</button>
            </div>
            <div class="settings-section">
                <h4>数据管理</h4>
                <div class="settings-actions">
                    <button type="button" id="clearDataBtn">清空数据</button>
                    <button type="button" id="exportDataBtn">导出JSON</button>
                </div>
            </div>
            <div class="settings-section">
                <h4>默认分类规则</h4>
                <label>任务关键词（逗号分隔）</label>
                <input id="taskKeywords" placeholder="例如：明天, 待办, todo">
                <label>链接识别规则</label>
                <input id="linkPattern" placeholder="例如：^(https?://)?([\w.-]+)\.[a-z]{2,6}(/.*)?$">
            </div>
            <div class="settings-section">
                <h4>显示设置</h4>
                <label class="switch-row"><input type="checkbox" id="showTimeToggle"> 显示时间</label>
                <label class="switch-row"><input type="checkbox" id="autoSortToggle"> 自动排序</label>
            </div>
            <div class="settings-section">
                <h4>关于</h4>
                <p>版本号：<span id="appVersion">0.1.0</span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
